<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Board Game Price Tracker</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<header>
  <div class="hrow">
    <h1>Board Game Price Tracker</h1>
    <span class="meta" id="updated"></span>
    <span class="right" style="display:flex;gap:6px;align-items:center">
      <button id="saveBtn" class="ghost">Save</button>
      <button id="runBtn" class="ghost">Run update</button>
      <span class="meta"><span class="dot" id="syncDot"></span><span id="syncTxt">local only</span></span>
    </span>
  </div>
  <nav id="nav">
    <button data-v="india" class="active">India view</button>
    <button data-v="country">Country view</button>
    <button data-v="analysis">Analysis</button>
    <button data-v="games">Games</button>
    <button data-v="settings">Settings</button>
  </nav>
</header>
<main id="app"></main>
<script src="app.js"></script>
</body>
</html>
