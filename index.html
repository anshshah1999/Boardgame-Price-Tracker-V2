<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Board Game Price Tracker</title>
<style>
:root{--bg:#0f1221;--panel:#181c2f;--panel2:#20263f;--line:#2c3350;--text:#e8ebf5;--muted:#9aa3c0;--accent:#ff5722;--buy:#1f9d55;--maybe:#c9a227;--dont:#c0392b;--blue:#3d7bfd;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);padding:10px 14px}
.hrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1{font-size:16px;margin:0;font-weight:500}
.meta{color:var(--muted);font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;background:var(--muted)}
.dot.ok{background:var(--buy)}.dot.warn{background:var(--maybe)}.dot.err{background:var(--dont)}
nav{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
nav button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:14px;cursor:pointer}
nav button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
main{padding:12px 14px 60px;max-width:1100px;margin:0 auto}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
input,select,textarea{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit}
input[type=search]{min-width:150px}
label.chk{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px}
button.act{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:14px}
button.ghost{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 11px;cursor:pointer;font-size:13px}
button.danger{background:var(--dont);color:#fff;border:none}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:9px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
td.num,th.num{text-align:right}
tr.game{cursor:pointer}
tr.game:hover{background:var(--panel)}
.verdict{font-weight:500;padding:3px 8px;border-radius:6px;font-size:12px;display:inline-block}
.v-Buy{background:rgba(31,157,85,.18);color:#4fd18a}
.v-Maybe{background:rgba(201,162,39,.18);color:#e6c14b}
.v-Dont{background:rgba(192,57,43,.18);color:#f0857a}
.v-No{background:rgba(154,163,192,.15);color:var(--muted)}
.expand{background:var(--panel);border:1px solid var(--line)}
.expand td{white-space:normal}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.fld label{display:block;color:var(--muted);font-size:12px;margin-bottom:3px}
.fld input,.fld select,.fld textarea{width:100%}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:15px;font-weight:500}
.muted{color:var(--muted)}.small{font-size:12px}
.pill{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
.right{margin-left:auto}.hide{display:none}
.warn-box{background:rgba(201,162,39,.12);border:1px solid var(--maybe);border-radius:8px;padding:10px;color:#e6c14b;font-size:13px;margin-bottom:12px}
.store{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--panel)}
.store .out{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px}
.store .out b{font-weight:500}
@media(max-width:640px){th.opt,td.opt{display:none}main{padding:10px 10px 60px}}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>Board Game Price Tracker</h1>
    <span class="meta" id="updated"></span>
    <span class="right meta"><span class="dot" id="syncDot"></span><span id="syncTxt">local only</span></span>
  </div>
  <nav id="nav">
    <button data-v="india" class="active">India view</button>
    <button data-v="compare">Compare stores</button>
    <button data-v="games">Games</button>
    <button data-v="settings">Settings</button>
  </nav>
</header>
<main id="app"></main>
<script>
"use strict";
var LS_STATE='bgpt_state', LS_TOKEN='bgpt_token';
var COUNTRIES=['USA','UK','Canada','Australia','NZ'];
var CUR={USA:'USD',UK:'GBP',Canada:'CAD',Australia:'AUD',NZ:'NZD'};
var CURLIST=['USD','GBP','CAD','AUD','NZD','INR'];
var DATA=null, STATE=null, VIEW='india', sortAsc=true, saveTimer=null;
var uiSearch='', uiHideDropped=true, compareGame='';

function blankState(){return {overrides:{}, added:[], quickAdd:'', sync:{owner:'',repo:'',branch:'main',path:'state.json'}};}
function loadState(){try{return Object.assign(blankState(),JSON.parse(localStorage.getItem(LS_STATE)||'{}'));}catch(e){return blankState();}}
function persistLocal(){localStorage.setItem(LS_STATE,JSON.stringify(STATE));}
function token(){return localStorage.getItem(LS_TOKEN)||'';}
function setToken(t){if(t)localStorage.setItem(LS_TOKEN,t);else localStorage.removeItem(LS_TOKEN);}
function cfg(k){return (STATE.config&&k in STATE.config)?STATE.config[k]:DATA.config[k];}
function fxRate(c){if(c==='INR')return 1;return (STATE.config&&STATE.config.fx&&STATE.config.fx[c]!=null)?STATE.config.fx[c]:DATA.meta.fx[c];}
function allGames(){return DATA.games.concat(STATE.added||[]);}
function ov(name){return STATE.overrides[name]||{};}
function inr(n){if(n==null||n==='')return '';return '₹'+Math.round(n).toLocaleString('en-IN');}
function pct(n){if(n==null||n==='')return '';return (n*100).toFixed(1)+'%';}
function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function norm(s){return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');}
function verdictFromLoss(loss){if(loss==null)return 'No Data';if(loss<=cfg('buyWithin'))return 'Buy';if(loss<=cfg('maybeWithin'))return 'Maybe';return "Don't Buy";}
function vclass(v){return v==='Buy'?'v-Buy':v==='Maybe'?'v-Maybe':v==="Don't Buy"?'v-Dont':'v-No';}

function chargesFor(name){var o=ov(name);return {forex:o.forexPct!=null?o.forexPct:cfg('forexPct'),overhead:o.overheadPct!=null?o.overheadPct:cfg('overheadPct'),delivery:o.delivery!=null?o.delivery:cfg('delivery')};}
function indiaNet(g){var o=ov(g.name);var disc=(o.discount!=null?o.discount:(g.discount!=null?g.discount:null));var src=g.india&&g.india.source?g.india.source:'';if(disc==null)disc=/board games india/i.test(src)?cfg('bgiDefaultDiscount'):0;var ip=g.india&&g.india.price?g.india.price:null;return {net:ip!=null?ip*(1-disc):null,disc:disc,listed:ip,src:src,stock:g.india?g.india.stock:''};}

function computeIndia(g){
  var ch=chargesFor(g.name);
  var best=null,bestC=null;
  COUNTRIES.forEach(function(c){var p=g.prices?g.prices[c]:null;if(p!=null&&p>0){var landed=p*fxRate(CUR[c])*(1+ch.forex)*(1+ch.overhead)+ch.delivery;if(best==null||landed<best){best=landed;bestC=c;}}});
  var iv=indiaNet(g);
  var options=[];if(iv.net!=null)options.push(iv.net);if(best!=null)options.push(best);
  var cheapest=options.length?Math.min.apply(null,options):null;
  var indiaLoss=(iv.net!=null&&cheapest!=null&&cheapest>0)?(iv.net-cheapest)/cheapest:null;
  var status=ov(g.name).status||g.status||'Not Started';
  return {g:g,status:status,net:iv.net,listed:iv.listed,disc:iv.disc,bestImport:best,bestC:bestC,cheapest:cheapest,indiaLoss:indiaLoss,verdict:verdictFromLoss(indiaLoss),stock:iv.stock};
}

var app=document.getElementById('app');
function render(){
  document.getElementById('updated').textContent=DATA?('data updated '+DATA.meta.updated):'';
  var btns=document.querySelectorAll('#nav button');for(var i=0;i<btns.length;i++)btns[i].className=(btns[i].getAttribute('data-v')===VIEW?'active':'');
  if(VIEW==='india')renderIndia();else if(VIEW==='compare')renderCompare();else if(VIEW==='games')renderGames();else renderSettings();
  updateBadge();
}

function renderIndia(){
  var rows=allGames().map(computeIndia).filter(function(r){
    if(uiHideDropped&&(r.status==='Purchased'||r.status==='Dropped'))return false;
    if(uiSearch&&r.g.name.toLowerCase().indexOf(uiSearch.toLowerCase())<0)return false;
    return true;
  });
  rows.sort(function(a,b){var x=a.indiaLoss==null?9e9:a.indiaLoss,y=b.indiaLoss==null?9e9:b.indiaLoss;return (sortAsc?1:-1)*(x-y);});
  var h='<div class="controls"><input type="search" id="q" placeholder="Search games…" value="'+esc(uiSearch)+'"/>'
    +'<label class="chk"><input type="checkbox" id="hd" '+(uiHideDropped?'checked':'')+'/> Hide purchased/dropped</label>'
    +'<span class="pill">Buy = within '+(cfg("buyWithin")*100)+'% of cheapest · Maybe ≤ '+(cfg("maybeWithin")*100)+'%</span></div>';
  h+='<div class="small muted" style="margin-bottom:6px">'+rows.length+' games · tap a row to edit discount, charges, status, notes</div>';
  h+='<table><thead><tr><th>Game</th><th class="num">India (net)</th><th class="num">Best import</th><th class="opt">Best from</th><th class="num">India vs cheapest</th><th>Buy in India?</th></tr></thead><tbody>';
  rows.forEach(function(r){
    h+='<tr class="game" data-n="'+esc(r.g.name)+'"><td>'+esc(r.g.name)+' '+(r.status!=='Not Started'?'<span class="pill">'+r.status+'</span>':'')+'</td>'
      +'<td class="num">'+inr(r.net)+(r.disc?'<div class="small muted">'+pct(r.disc)+' off</div>':'')+'</td>'
      +'<td class="num">'+inr(r.bestImport)+'</td><td class="opt">'+(r.bestC||'')+'</td>'
      +'<td class="num">'+(r.indiaLoss==null?'':(r.indiaLoss>0?'+':'')+pct(r.indiaLoss))+'</td>'
      +'<td><span class="verdict '+vclass(r.verdict)+'">'+r.verdict+'</span></td></tr>';
  });
  h+='</tbody></table>';
  app.innerHTML=h;
  var q=document.getElementById('q');q.oninput=function(e){uiSearch=e.target.value;renderIndia();};
  document.getElementById('hd').onchange=function(e){uiHideDropped=e.target.checked;renderIndia();};
  var gr=app.querySelectorAll('tr.game');for(var i=0;i<gr.length;i++)gr[i].onclick=function(){editRow(this,this.getAttribute('data-n'));};
}
function editRow(tr,name){
  var nx=tr.nextElementSibling;if(nx&&nx.className.indexOf('expand')>=0){nx.parentNode.removeChild(nx);return;}
  var g=allGames().filter(function(x){return x.name===name;})[0];var o=ov(name);var r=computeIndia(g);
  var autoTxt=/board games india/i.test(r.stock?'':'')?'':'';
  var row=document.createElement('tr');row.className='expand';
  row.innerHTML='<td colspan="6"><div class="grid">'
    +fld('India discount % (blank = auto)','ed_disc',o.discount!=null?o.discount*100:'','number','auto')
    +fld('Forex % (default '+cfg('forexPct')*100+')','ed_forex',o.forexPct!=null?o.forexPct*100:'','number',cfg('forexPct')*100)
    +fld('Overhead % (default '+cfg('overheadPct')*100+')','ed_over',o.overheadPct!=null?o.overheadPct*100:'','number',cfg('overheadPct')*100)
    +fld('Delivery (default '+cfg('delivery')+')','ed_del',o.delivery!=null?o.delivery:'','number',cfg('delivery'))
    +'<div class="fld"><label>Status</label><select id="ed_status">'+['Not Started','Priced','Purchased','Dropped'].map(function(s){return '<option '+(r.status===s?'selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'
    +'<div class="fld" style="grid-column:1/-1"><label>Notes (saved to your synced state)</label><textarea id="ed_notes" rows="2">'+esc(o.notes||'')+'</textarea></div></div>'
    +'<div class="small muted" style="margin-top:8px">India listed '+inr(r.listed)+' '+(r.stock?'· '+esc(r.stock):'')+' · net '+inr(r.net)+' | Best import '+inr(r.bestImport)+' '+(r.bestC||'')+'</div>'
    +'<div style="margin-top:8px"><button class="act" id="ed_save">Save</button> <button class="ghost" id="ed_clear">Clear overrides</button> <button class="ghost" id="ed_cmp">Compare stores →</button></div></td>';
  if(tr.nextSibling)tr.parentNode.insertBefore(row,tr.nextSibling);else tr.parentNode.appendChild(row);
  var num=function(id){var v=document.getElementById(id).value;return v===''?null:parseFloat(v);};
  document.getElementById('ed_save').onclick=function(){
    var no=Object.assign({},o);var d=num('ed_disc');no.discount=(d!=null?d/100:undefined);
    var f=num('ed_forex');no.forexPct=(f!=null?f/100:undefined);var ovr=num('ed_over');no.overheadPct=(ovr!=null?ovr/100:undefined);
    var dl=num('ed_del');no.delivery=(dl!=null?dl:undefined);no.status=document.getElementById('ed_status').value;
    var nt=document.getElementById('ed_notes').value.trim();no.notes=nt||undefined;
    STATE.overrides[name]=clean(no);changed();render();
  };
  document.getElementById('ed_clear').onclick=function(){delete STATE.overrides[name];changed();render();};
  document.getElementById('ed_cmp').onclick=function(){compareGame=name;VIEW='compare';render();};
}
function clean(o){var r={};for(var k in o)if(o[k]!==undefined&&o[k]!=='')r[k]=o[k];return r;}
function fld(label,id,value,type,ph){return '<div class="fld"><label>'+label+'</label><input type="'+(type||'text')+'" id="'+id+'" value="'+esc(value)+'" placeholder="'+esc(ph||'')+'"/></div>';}

function storeFinal(s){var fx=fxRate(s.currency||'USD');var billing=(parseFloat(s.price)||0)*(1-(parseFloat(s.discount)||0)/100);var ship=(parseFloat(s.shipping)||0);var overhead=(parseFloat(s.overhead)||0)/100;return (billing*fx+ship*fx)*(1+overhead);}
function renderCompare(){
  var games=allGames();
  if(!compareGame&&games.length)compareGame=games[0].name;
  var g=games.filter(function(x){return x.name===compareGame;})[0];
  var h='<div class="controls"><label class="chk">Game <select id="cg" style="min-width:220px">'
    +games.map(function(x){return '<option '+(x.name===compareGame?'selected':'')+'>'+esc(x.name)+'</option>';}).join('')+'</select></label></div>';
  if(g){
    var iv=indiaNet(g);
    var stores=(ov(g.name).stores||[]).slice();
    var finals=stores.map(storeFinal);
    var cheapest=finals.length?Math.min.apply(null,finals.filter(function(v){return v>0;})):null;
    h+='<div class="card"><h3>'+esc(g.name)+'</h3><div class="small muted">India net '+inr(iv.net)+(iv.listed?' (listed '+inr(iv.listed)+', '+pct(iv.disc)+' off)':'')+' · cheapest store '+(cheapest!=null?inr(cheapest):'—')+'</div></div>';
    stores.forEach(function(s,idx){
      var fc=storeFinal(s);
      var loss=(cheapest!=null&&cheapest>0)?(fc-cheapest)/cheapest:null;
      var benefit=(iv.net!=null)?iv.net-fc:null;
      var benefitPct=(iv.net!=null&&iv.net>0)?benefit/iv.net:null;
      var verd=verdictFromLoss(loss);
      h+='<div class="store"><div class="grid">'
        +'<div class="fld"><label>Store / site</label><input data-i="'+idx+'" data-k="name" value="'+esc(s.name||'')+'" placeholder="Amazon US"/></div>'
        +'<div class="fld"><label>Currency</label><select data-i="'+idx+'" data-k="currency">'+CURLIST.map(function(c){return '<option '+((s.currency||'USD')===c?'selected':'')+'>'+c+'</option>';}).join('')+'</select></div>'
        +'<div class="fld"><label>Website price</label><input type="number" data-i="'+idx+'" data-k="price" value="'+esc(s.price!=null?s.price:'')+'"/></div>'
        +'<div class="fld"><label>Discount %</label><input type="number" data-i="'+idx+'" data-k="discount" value="'+esc(s.discount!=null?s.discount:'')+'"/></div>'
        +'<div class="fld"><label>Shipping (local)</label><input type="number" data-i="'+idx+'" data-k="shipping" value="'+esc(s.shipping!=null?s.shipping:'')+'"/></div>'
        +'<div class="fld"><label>Overhead %</label><input type="number" data-i="'+idx+'" data-k="overhead" value="'+esc(s.overhead!=null?s.overhead:'')+'"/></div>'
        +'</div><div class="out"><span>Final cost <b>'+inr(fc)+'</b></span><span class="muted">vs India '+(benefit!=null?(benefit>=0?'save ':'lose ')+inr(Math.abs(benefit))+' ('+pct(benefitPct)+')':'—')+'</span>'
        +'<span class="muted">vs cheapest '+(loss!=null?(loss>0?'+':'')+pct(loss):'—')+'</span>'
        +'<span class="verdict '+vclass(verd)+'">'+verd+'</span>'
        +'<button class="ghost right" data-del="'+idx+'">Remove</button></div></div>';
    });
    h+='<div style="margin-top:8px"><button class="act" id="addStore">+ Add store</button></div>';
    h+='<div class="small muted" style="margin-top:8px">Final cost = (price×(1−discount) + shipping) × conversion × (1+overhead). Verdict compares each store to the cheapest store above.</div>';
  }
  app.innerHTML=h;
  document.getElementById('cg').onchange=function(e){compareGame=e.target.value;render();};
  var addB=document.getElementById('addStore');
  if(addB)addB.onclick=function(){var o=Object.assign({},ov(g.name));o.stores=(o.stores||[]).concat([{name:'',currency:'USD',price:'',discount:'',shipping:'',overhead:''}]);STATE.overrides[g.name]=o;changed();render();};
  var inputs=app.querySelectorAll('[data-k]');
  for(var i=0;i<inputs.length;i++){inputs[i].onchange=function(){
    var idx=parseInt(this.getAttribute('data-i')),k=this.getAttribute('data-k');
    var o=Object.assign({},ov(g.name));o.stores=(o.stores||[]).slice();o.stores[idx]=Object.assign({},o.stores[idx]);o.stores[idx][k]=this.value;
    STATE.overrides[g.name]=o;changed();render();
  };}
  var dels=app.querySelectorAll('[data-del]');
  for(var j=0;j<dels.length;j++)dels[j].onclick=function(){var idx=parseInt(this.getAttribute('data-del'));var o=Object.assign({},ov(g.name));o.stores=(o.stores||[]).slice();o.stores.splice(idx,1);STATE.overrides[g.name]=o;changed();render();};
}

function renderGames(){
  var h='<div class="card"><h3>Quick add <span class="small muted">— jot rough names, one per line</span></h3>'
    +'<textarea id="qa" rows="3" style="width:100%" placeholder="e.g. radlands\nlegacy of yu">'+esc(STATE.quickAdd||'')+'</textarea>'
    +'<div style="margin-top:8px"><button class="act" id="qaAdd">Add lines as games</button> <button class="ghost" id="qaSave">Save draft</button></div>'
    +'<div class="small muted" style="margin-top:6px">Each line is matched against your list; unknown names are added as new (editable below).</div></div>';
  var rows=allGames();
  h+='<div class="small muted" style="margin:4px 2px">'+rows.length+' games</div>';
  h+='<table><thead><tr><th>Game</th><th class="opt">Type</th><th>Status</th><th class="num">India</th><th></th></tr></thead><tbody>';
  rows.forEach(function(g,i){
    var o=ov(g.name);var st=o.status||g.status||'Not Started';var added=STATE.added.indexOf(g)>=0;
    h+='<tr><td>'+(added?'<input data-add="'+STATE.added.indexOf(g)+'" value="'+esc(g.name)+'" style="min-width:180px"/>':esc(g.name))+'</td>'
      +'<td class="opt small muted">'+(g.type||'')+'</td><td>'+st+'</td><td class="num">'+(g.india&&g.india.price?inr(g.india.price):'')+'</td>'
      +'<td>'+(added?'<button class="ghost" data-rm="'+STATE.added.indexOf(g)+'">del</button>':'')+'</td></tr>';
  });
  h+='</tbody></table>';
  app.innerHTML=h;
  document.getElementById('qaSave').onclick=function(){STATE.quickAdd=document.getElementById('qa').value;changed();};
  document.getElementById('qaAdd').onclick=function(){
    var lines=(document.getElementById('qa').value||'').split('\n').map(function(s){return s.trim();}).filter(Boolean);
    var known={};allGames().forEach(function(g){known[norm(g.name)]=true;});
    var addedN=0,matched=0;
    lines.forEach(function(n){var k=norm(n);if(known[k]){matched++;return;}
      var hit=allGames().filter(function(g){return norm(g.name).indexOf(k)>=0||k.indexOf(norm(g.name))>=0;})[0];
      if(hit){matched++;return;}
      STATE.added.push({name:n,type:'Boardgame',bgoId:'',india:null,prices:{},stock:{},status:'Not Started'});known[k]=true;addedN++;
    });
    STATE.quickAdd='';changed();render();
    alert('Added '+addedN+' new, '+matched+' already in list. Edit any name inline below.');
  };
  var edits=app.querySelectorAll('[data-add]');
  for(var i=0;i<edits.length;i++)edits[i].onchange=function(){var idx=parseInt(this.getAttribute('data-add'));STATE.added[idx].name=this.value.trim();changed();};
  var rms=app.querySelectorAll('[data-rm]');
  for(var j=0;j<rms.length;j++)rms[j].onclick=function(){var idx=parseInt(this.getAttribute('data-rm'));STATE.added.splice(idx,1);changed();render();};
}

function renderSettings(){
  var s=STATE.sync||{};
  var h='<div class="card"><h3>Conversion rates (INR per unit)</h3><div class="grid">'
    +['USD','GBP','CAD','AUD','NZD'].map(function(c){return '<div class="fld"><label>'+c+'</label><input type="number" step="0.01" data-fx="'+c+'" value="'+fxRate(c)+'"/></div>';}).join('')
    +'</div><div class="small muted" style="margin-top:6px">Refreshed by the scraper each run.</div></div>';
  h+='<div class="card"><h3>Thresholds &amp; default charges</h3><div class="grid">'
    +'<div class="fld"><label>Buy if within % of cheapest</label><input type="number" data-cfg="buyWithin" value="'+cfg('buyWithin')*100+'"/></div>'
    +'<div class="fld"><label>Maybe if within % of cheapest</label><input type="number" data-cfg="maybeWithin" value="'+cfg('maybeWithin')*100+'"/></div>'
    +'<div class="fld"><label>Forex %</label><input type="number" data-cfg="forexPct" value="'+cfg('forexPct')*100+'"/></div>'
    +'<div class="fld"><label>Overhead %</label><input type="number" data-cfg="overheadPct" value="'+cfg('overheadPct')*100+'"/></div>'
    +'<div class="fld"><label>Default delivery</label><input type="number" data-cfg="delivery" value="'+cfg('delivery')+'"/></div>'
    +'<div class="fld"><label>Board Games India default discount %</label><input type="number" data-cfg="bgiDefaultDiscount" value="'+cfg('bgiDefaultDiscount')*100+'"/></div>'
    +'</div><div style="margin-top:8px"><button class="act" id="cfgSave">Save</button></div></div>';
  h+='<div class="card"><h3>Cross-device sync (GitHub)</h3><div class="small muted" style="margin-bottom:8px">Your notes, added games, overrides and store lists live in <code>state.json</code> in your repo. Token stays on this device only.</div><div class="grid">'
    +'<div class="fld"><label>Owner</label><input id="sy_owner" value="'+esc(s.owner||'')+'"/></div>'
    +'<div class="fld"><label>Repo</label><input id="sy_repo" value="'+esc(s.repo||'')+'"/></div>'
    +'<div class="fld"><label>Branch</label><input id="sy_branch" value="'+esc(s.branch||'main')+'"/></div>'
    +'<div class="fld" style="grid-column:1/-1"><label>GitHub token (fine-grained, this repo, Contents: read/write)</label><input id="sy_token" type="password" value="'+esc(token())+'"/></div>'
    +'</div><div style="margin-top:8px"><button class="act" id="syncSave">Save &amp; push</button> <button class="ghost" id="syncPull">Pull</button> <span class="small muted" id="syncMsg"></span></div></div>';
  h+='<div class="card"><h3>Backup / reset</h3><button class="ghost" id="exp">Export</button> <button class="ghost" id="imp">Import</button><input type="file" id="impF" class="hide" accept="application/json"/> <button class="danger" id="reset" style="padding:8px 12px">Reset my edits</button></div>';
  app.innerHTML=h;
  var fxs=app.querySelectorAll('[data-fx]');for(var i=0;i<fxs.length;i++)fxs[i].onchange=function(){STATE.config=STATE.config||{};STATE.config.fx=STATE.config.fx||{};STATE.config.fx[this.getAttribute('data-fx')]=parseFloat(this.value);changed();};
  document.getElementById('cfgSave').onclick=function(){STATE.config=STATE.config||{};var cs=app.querySelectorAll('[data-cfg]');for(var i=0;i<cs.length;i++){var k=cs[i].getAttribute('data-cfg');var v=parseFloat(cs[i].value);STATE.config[k]=(k==='delivery')?v:v/100;}changed();render();};
  document.getElementById('syncSave').onclick=function(){STATE.sync={owner:val('sy_owner'),repo:val('sy_repo'),branch:val('sy_branch')||'main',path:'state.json'};setToken(val('sy_token'));persistLocal();pushState(true);};
  document.getElementById('syncPull').onclick=function(){STATE.sync={owner:val('sy_owner'),repo:val('sy_repo'),branch:val('sy_branch')||'main',path:'state.json'};setToken(val('sy_token'));persistLocal();pullState(true);};
  document.getElementById('exp').onclick=exportState;
  document.getElementById('imp').onclick=function(){document.getElementById('impF').click();};
  document.getElementById('impF').onchange=importState;
  document.getElementById('reset').onclick=function(){if(confirm('Reset all your edits? Scraped prices stay.')){STATE=blankState();persistLocal();render();}};
}

function changed(){persistLocal();if(syncReady()){clearTimeout(saveTimer);saveTimer=setTimeout(function(){pushState(false);},1500);setSync('warn','saving…');}}
function syncReady(){return STATE.sync&&STATE.sync.owner&&STATE.sync.repo&&token();}
function ghH(){return {'Authorization':'token '+token(),'Accept':'application/vnd.github+json'};}
function ghUrl(){var s=STATE.sync;return 'https://api.github.com/repos/'+s.owner+'/'+s.repo+'/contents/'+s.path;}
function syncBody(){var c=JSON.parse(JSON.stringify(STATE));delete c.sync;return c;}
function pushState(manual){if(!syncReady()){if(manual)setMsg('Fill owner, repo and token first.');return;}
  fetch(ghUrl()+'?ref='+STATE.sync.branch,{headers:ghH()}).then(function(r){return r.ok?r.json():null;}).then(function(j){
    var content=btoa(unescape(encodeURIComponent(JSON.stringify(syncBody(),null,1))));
    var body={message:'Update tracker settings',content:content,branch:STATE.sync.branch};if(j&&j.sha)body.sha=j.sha;
    return fetch(ghUrl(),{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
  }).then(function(r){if(r&&r.ok){setSync('ok','synced');setMsg('Pushed');}else{setSync('err','sync error');setMsg('Push failed');}}).catch(function(){setSync('err','offline');setMsg('Push error');});}
function pullState(manual){if(!syncReady()){if(manual)setMsg('Fill owner, repo and token first.');return;}
  fetch(ghUrl()+'?ref='+STATE.sync.branch,{headers:ghH()}).then(function(r){if(!r.ok)throw r.status;return r.json();}).then(function(j){
    var obj=JSON.parse(decodeURIComponent(escape(atob(j.content))));var sync=STATE.sync;STATE=Object.assign(blankState(),obj);STATE.sync=sync;persistLocal();setSync('ok','synced');setMsg('Pulled');if(document.getElementById('nav').style.visibility!=='hidden')render();
  }).catch(function(e){if(e!==404){setMsg('Pull failed');setSync('err','sync error');}});}
function setSync(c,t){var d=document.getElementById('syncDot'),x=document.getElementById('syncTxt');if(d)d.className='dot '+(c||'');if(x)x.textContent=t;}
function setMsg(m){var e=document.getElementById('syncMsg');if(e)e.textContent=m;}
function updateBadge(){if(syncReady())setSync('ok','sync on');else setSync('','local only');}
function exportState(){var b=new Blob([JSON.stringify(syncBody(),null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='bgpt-settings.json';a.click();}
function importState(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){try{var o=JSON.parse(rd.result);var sync=STATE.sync;STATE=Object.assign(blankState(),o);STATE.sync=sync;persistLocal();render();}catch(err){alert('Bad file');}};rd.readAsText(f);}

var navBtns=document.querySelectorAll('#nav button');for(var b=0;b<navBtns.length;b++)navBtns[b].onclick=function(){VIEW=this.getAttribute('data-v');render();};

function validateAccess(owner,repo,tok){if(!owner||!repo||!tok)return Promise.resolve(false);return fetch('https://api.github.com/repos/'+owner+'/'+repo,{headers:{'Authorization':'token '+tok,'Accept':'application/vnd.github+json'}}).then(function(r){return r.ok;}).catch(function(){return false;});}
function enterApp(){document.getElementById('nav').style.visibility='visible';VIEW='india';render();}
function showGate(msg){
  document.getElementById('nav').style.visibility='hidden';var s=STATE.sync||{};
  app.innerHTML='<div class="card" style="max-width:460px;margin:26px auto"><h3>Connect this device</h3><div class="small muted" style="margin-bottom:10px">The app checks for a working GitHub token before opening. It is stored only on this device.</div>'
    +(msg?'<div class="warn-box">'+esc(msg)+'</div>':'')
    +fld('Owner','g_owner',s.owner||'')+fld('Repo','g_repo',s.repo||'')+fld('Branch','g_branch',s.branch||'main')
    +'<div class="fld" style="margin-top:8px"><label>GitHub token</label><input id="g_token" type="password" value="'+esc(token())+'"/></div>'
    +'<div style="margin-top:10px"><button class="act" id="g_go">Connect &amp; open</button> <a href="#" id="g_skip" class="small muted" style="margin-left:12px">open local-only</a></div></div>';
  document.getElementById('g_go').onclick=function(){var owner=val('g_owner'),repo=val('g_repo'),branch=val('g_branch')||'main',tok=val('g_token');document.getElementById('g_go').textContent='Checking…';
    validateAccess(owner,repo,tok).then(function(ok){if(!ok){showGate('That token + repo did not validate.');return;}STATE.sync={owner:owner,repo:repo,branch:branch,path:'state.json'};setToken(tok);persistLocal();pullState(false);enterApp();});};
  document.getElementById('g_skip').onclick=function(e){e.preventDefault();enterApp();};
}
(function(){
  STATE=loadState();
  fetch('data.json',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){DATA=d;boot();}).catch(function(){DATA={meta:{updated:'-',fx:{USD:85,GBP:117,CAD:59,AUD:55,NZD:50}},config:{buyWithin:.1,maybeWithin:.25,forexPct:.03,overheadPct:.1,delivery:0,bgiDefaultDiscount:.1},games:[]};boot();});
  function boot(){var s=STATE.sync||{};if(s.owner&&s.repo&&token()){validateAccess(s.owner,s.repo,token()).then(function(ok){if(ok){pullState(false);enterApp();}else showGate('Saved token no longer works - reconnect.');});}else showGate('');}
})();
</script>
</body>
</html>
