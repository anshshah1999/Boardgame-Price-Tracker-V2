# Optional: fully-automated biweekly price refresh.
# Put this file at .github/workflows/update-prices.yml in your repo.
# It runs the scraper on a schedule and commits the refreshed data.json.
# (This is the CI option — it makes the whole list update without you or the agent.)

name: Update board game prices
on:
  schedule:
    - cron: '0 3 1,15 * *'   # 03:00 UTC on the 1st and 15th of each month
  workflow_dispatch: {}        # also allow manual "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Scrape prices
        run: node scraper.js
      - name: Commit if changed
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Refresh prices $(date -u +%F)"
          git push
